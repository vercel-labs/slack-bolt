name: Canary Release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  canary:
    name: Publish Canary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec turbo run build --filter=@vercel/slack-bolt

      - name: Set canary version
        working-directory: packages/slack-bolt
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          pnpm version "${CURRENT_VERSION}-canary.${TIMESTAMP}.${SHORT_SHA}" --no-git-tag-version

      - name: Publish canary
        working-directory: packages/slack-bolt
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          pnpm publish --tag canary --access public --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_VERCEL_TOKEN_ELEVATED }}
