version: 2
updates:
  # Root devDependencies (turbo, biome, husky)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      root-dev-dependencies:
        dependency-type: "development"
    open-pull-requests-limit: 1
    reviewers:
      - "malewis5"

  # Published package (@vercel/slack-bolt)
  - package-ecosystem: "npm"
    directory: "/packages/slack-bolt"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      all-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 1
    reviewers:
      - "malewis5"

  # Example app (nextjs)
  - package-ecosystem: "npm"
    directory: "/examples/nextjs"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      example-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 1
    reviewers:
      - "malewis5"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      all-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 1
    reviewers:
      - "malewis5"
